spring.application.name=produits-jardinage

server.port = 8081

#CONFIGURATION DE H2 DATABASE
spring.datasource.url = jdbc:h2:mem:jardinagedb
spring.datasource.driverClassName = org.h2.Driver
spring.datasource.username = sa
spring.datasource.password =

#H2 CONSOLE
spring.h2.console.enabled = true
spring.h2.console.path = /h2-console

#JPA
spring.jpa.properties.dialect = org.hibernate.dialect.H2Dialect
spring.jpa.show-sql = true
spring.jpa.hibernate.ddl-auto = create-drop

#Logging

logging.level.root = INFO
logging.level.galand.projects.produits_jardinage = DEBUG
logging.pattern.console = %d{yyyy-MM-dd HH:mm:ss} - %msg%n
